services:
  postgres:
    image: postgres:16-alpine
    container_name: decentra-postgres
    # NOTE: Port 5432 is exposed for development and testing purposes.
    # In production deployments, remove this port mapping or restrict access
    # to prevent unauthorized database access from external networks.
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - decentra-data:/var/lib/postgresql/data
    networks:
      - decentra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decentra"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: decentra-livekit
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"       # HTTP/WS signaling
      - "7881:7881/tcp"   # WebRTC TCP fallback
      - "7882:7882/udp"   # WebRTC UDP
    networks:
      - decentra-network
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: decentra-coturn
    volumes:
      - ./coturn/coturn.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/udp"    # TURN UDP relay
      - "3478:3478/tcp"    # TURN TCP relay
      - "5349:5349/tcp"    # TURN TLS
      - "49152-49200:49152-49200/udp"  # TURN relay port range
    environment:
      - COTURN_SECRET=${COTURN_SECRET}
    networks:
      - decentra-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: decentra-server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DECENTRA_ENCRYPTION_KEY=${DECENTRA_ENCRYPTION_KEY}
      - DECENTRA_LICENSE_KEY=${DECENTRA_LICENSE_KEY:-}
      # LiveKit SFU — token signing. Change key/secret before going to production.
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret_change_me_in_production}
      # URL the *browser* uses to reach LiveKit (must be reachable from client machines).
      # In production set this to wss://your-domain.com:7880
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      # Coturn TURN relay — used for P2P DM calls and ICE relay
      - COTURN_SECRET=${COTURN_SECRET}
      - COTURN_URL=${COTURN_URL:-turn:localhost:3478}
      - COTURN_REALM=${COTURN_REALM:-decentra.local}
    networks:
      - decentra-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
      coturn:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: decentra-frontend
    ports:
      - "8765:8443"
    networks:
      - decentra-network
    restart: unless-stopped
    depends_on:
      - server

volumes:
  decentra-data:
    driver: local

networks:
  decentra-network:
    driver: bridge
