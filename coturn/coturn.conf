# Coturn TURN server configuration for Decentra
# See https://github.com/coturn/coturn/wiki/turnserver for full reference.
#
# SECURITY: This config uses HMAC-based time-limited credentials (use-auth-secret).
# The server and clients derive short-lived credentials from COTURN_SECRET.
# Never expose COTURN_SECRET to end users.

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay port range — must match the range exposed in docker-compose.yml
min-port=49152
max-port=49200

# Realm — should match your domain in production
realm=decentra.local

# HMAC-based time-limited credentials (RFC 8489 long-term credential mechanism
# with shared secret). The server backend generates username/credential pairs
# signed with this secret; Coturn verifies them on the fly.
use-auth-secret
# static-auth-secret is injected via '--static-auth-secret' CLI arg in docker-compose.yml
# (the coturn image does not have envsubst to expand environment variables here)

# ── TLS hardening ──────────────────────────────────────────────────────────
# Note: TLSv1.0 and TLSv1.1 are already disabled by OpenSSL 3+ at compile time.
# no-tlsv1 / no-tlsv1_1 directives are not needed with modern OpenSSL builds.

# ── Anti-abuse: prevent TURN relay from being used to reach private networks ─
# Block all RFC1918 / link-local / loopback ranges
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
denied-peer-ip=fe80::-febf::ffff:ffff:ffff:ffff

# ── Performance ────────────────────────────────────────────────────────────
# Run as a daemon in the background (Docker will manage the process)
# no-cli — disable the telnet CLI (not needed in Docker)
no-cli

# Fingerprinting
fingerprint

# Log to stdout (Docker captures it)
log-file=stdout
simple-log
