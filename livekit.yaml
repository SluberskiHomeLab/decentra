# LiveKit SFU configuration for Decentra
# See https://docs.livekit.io/realtime/self-hosting/deployment/ for full reference.
#
# SECURITY: Change the key/secret below before any internet-facing deployment.
# The matching values must be set in your .env file / environment:
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=devsecret_change_me_in_production

port: 7880

rtc:
  tcp_port: 7881
  udp_port: 7882
  # Set use_external_ip: true when the host is behind NAT (production VPS)
  use_external_ip: false
  # UDP port range for media; narrow range avoids large Docker port-mapping overhead
  port_range_start: 50000
  port_range_end: 50200

# TURN relay: requires a domain (hostname) for certificate-based auth.
# To enable, uncomment and set your hostname:
#
# turn:
#   enabled: true
#   domain: your-livekit-host.example.com
#   udp_port: 3478
#   tls_port: 5349
#   external_tls: false

# API key / secret: must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET env vars on the server
# Format:  <key>: <secret>
keys:
  devkey: devsecret_change_me_in_production

logging:
  level: info
  # Reduce pion (WebRTC) log noise in dev; set to "info" for debugging ICE issues
  pion_level: error
